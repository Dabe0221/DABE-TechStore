<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Wishlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <a href="/" class="btn btn-secondary mb-4">Back to Store</a>

    <h1 class="mb-4">❤️ My Wishlist</h1>

    <div th:if="${#lists.isEmpty(wishlistItems)}" class="alert alert-info">
        Your wishlist is empty.
    </div>

    <div class="row" th:if="${!#lists.isEmpty(wishlistItems)}">

        <div class="col-md-3 mb-4" th:each="item : ${wishlistItems}">
            <div class="card h-100 shadow-sm">

                <img th:src="@{${item.product.imageUrl}}"
                     class="card-img-top"
                     style="height:200px;object-fit:cover;">

                <div class="card-body">
                    <h5 th:text="${item.product.name}">Product</h5>

                    <p class="text-primary fw-bold">
                        ₱<span th:text="${item.product.price}">0</span>
                    </p>

                    <a th:href="@{/product/{id}(id=${item.product.id})}"
                       class="btn btn-outline-primary w-100 mb-2">
                        View Product
                    </a>

                    <a th:if="${item.product.stock > 0}"
                       th:href="@{/cart/add/{id}(id=${item.product.id})}"
                       class="btn btn-primary w-100 mb-2">
                        Add to Cart
                    </a>

                    <button th:if="${item.product.stock <= 0}"
                            class="btn btn-secondary w-100 mb-2"
                            disabled>
                        Sold Out
                    </button>

                   <form th:action="@{/wishlist/remove/{id}(id=${item.product.id})}"
                                  method="post">
                             <button class="btn btn-outline-danger w-100">
                                       Remove
                                          </button>
                                   </form>
                </div>

            </div>
        </div>

    </div>

</div>
</body>
</html>
