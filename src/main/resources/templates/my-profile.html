<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5" style="max-width: 650px;">

    <a href="/" class="btn btn-secondary mb-4">Back to Store</a>

    <h1>My Profile</h1>

    <form th:action="@{/my-profile/update}" th:object="${user}" method="post" class="card mt-4">
        <div class="card-body">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" readonly>
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text" th:field="*{phone}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Address</label>
                <textarea th:field="*{address}" class="form-control"></textarea>
            </div>

            <button class="btn btn-success">
                Save Changes
            </button>

        </div>
    </form>

</div>
</body>
</html>
