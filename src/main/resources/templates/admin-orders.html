<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <div class="d-flex justify-content-between mb-4">
        <h1>Admin - Orders</h1>
        <a href="/admin/products" class="btn btn-secondary">Products</a>
    </div>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>Order #</th>
        <th>Customer</th>
        <th>Total</th>
        <th>Payment</th>
        <th>Payment Status</th>
        <th>Order Status</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.customerName}"></td>

        <td>
            ₱<span th:text="${order.totalAmount}"></span>
        </td>

        <td th:text="${order.paymentMethod}"></td>

        <td>
            <span th:if="${order.paymentStatus == 'Paid'}"
                  class="badge bg-success">
                Paid
            </span>

            <span th:if="${order.paymentStatus == 'Pending Payment'}"
                  class="badge bg-warning text-dark">
                Pending Payment
            </span>

            <span th:if="${order.paymentStatus == 'Unpaid'}"
                  class="badge bg-danger">
                Unpaid
            </span>
        </td>

        <td>
            <span th:if="${order.status == 'Pending'}"
                  class="badge bg-warning text-dark">
                Pending
            </span>

            <span th:if="${order.status == 'Processing'}"
                  class="badge bg-primary">
                Processing
            </span>

            <span th:if="${order.status == 'Shipped'}"
                  class="badge bg-info text-dark">
                Shipped
            </span>

            <span th:if="${order.status == 'Delivered'}"
                  class="badge bg-success">
                Delivered
            </span>

            <span th:if="${order.status == 'Cancelled'}"
                  class="badge bg-danger">
                Cancelled
            </span>
        </td>

       <td>
    <a th:href="@{/admin/order-details(id=${order.id})}"
       class="btn btn-sm btn-dark">
        View
    </a>

    <a th:href="@{/my-orders/{id}/invoice(id=${order.id})}"
       class="btn btn-sm btn-secondary">
        Invoice
    </a>

    <form th:action="@{/admin/orders/{id}/resend-email(id=${order.id})}"
      method="post"
      style="display:inline;">
    <button class="btn btn-sm btn-warning">
        Resend Email
    </button>
</form>

<form th:if="${order.paymentStatus != 'Paid'}"
      th:action="@{/admin/orders/{id}/mark-paid(id=${order.id})}"
      method="post"
      style="display:inline;">
    <button class="btn btn-sm btn-success">
        Mark Paid
    </button>
</form>

</td>
    </tr>
    </tbody>
</table>

    <a href="/" class="btn btn-primary">Back to Store</a>

</div>
</body>
</html>
