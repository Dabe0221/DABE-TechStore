<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <div class="d-flex justify-content-between mb-4">
        <h1>Admin - Orders</h1>
        <a href="/admin/products" class="btn btn-secondary">Products</a>
    </div>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.customerName}">Customer</td>
            <td th:text="${order.email}">Email</td>
            <td th:text="${order.phone}">Phone</td>
            <td>₱<span th:text="${order.totalAmount}">0</span></td>
            <td>
                <span class="badge bg-warning text-dark" th:text="${order.status}">
                    Pending
                </span>
            </td>
            <td th:text="${order.orderDate}">Date</td>

            <td>
    <a th:href="@{/admin/order-details(id=${order.id})}"
   class="btn btn-primary btn-sm">
    View
</a>
</td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-primary">Back to Store</a>

</div>
</body>
</html>
