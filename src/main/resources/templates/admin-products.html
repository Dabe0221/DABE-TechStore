<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Admin - Products</h1>

        <a href="/" class="btn btn-secondary">
            Back to Store
        </a>
    </div>

    

    <a href="/admin/add-product" class="btn btn-primary mb-3">
    Add Product
</a>

    <table class="table table-bordered table-hover align-middle">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th width="180">Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}">1</td>

            <td>
               <img th:src="@{${product.imageUrl}}"
     width="90"
     height="90"
     style="object-fit: cover; border-radius: 8px;">
            </td>

            <td th:text="${product.name}">Product Name</td>
            <td th:text="${product.category}">Category</td>

            <td>
                ₱<span th:text="${product.price}">0</span>
            </td>

            <td th:text="${product.stock}">0</td>

            <td>
               <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
   class="btn btn-warning btn-sm">
    Edit
</a>

                <a th:href="@{/admin/products/delete/{id}(id=${product.id})}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Delete this product?')">
    Delete
</a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
