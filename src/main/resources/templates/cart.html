<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">

    <a href="/" class="btn btn-secondary mb-4">Back to Store</a>

    <h1 class="mb-4">Your Shopping Cart</h1>

    <div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

    <div th:if="${#lists.isEmpty(cart.items)}">
        <div class="alert alert-warning">
            Your cart is empty.
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(cart.items)}">

        <table class="table table-bordered align-middle">
            <thead class="table-dark">
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Subtotal</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="item : ${cart.items}">
                <td th:text="${item.product.name}">Product Name</td>
                <td>₱<span th:text="${item.product.price}">0</span></td>
<td>
    <div class="d-flex align-items-center gap-2">
        <a th:href="@{/cart/decrease/{id}(id=${item.product.id})}"
           class="btn btn-outline-secondary btn-sm">
            -
        </a>

        <span th:text="${item.quantity}">1</span>

        <a th:href="@{/cart/increase/{id}(id=${item.product.id})}"
   class="btn btn-outline-secondary btn-sm">
    +
</a>
    </div>
</td>
                <td>₱<span th:text="${item.subtotal}">0</span></td>
                <td>
                    <a th:href="@{/cart/remove/{id}(id=${item.product.id})}"
                       class="btn btn-danger btn-sm">
                        Remove
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

       <h3 class="text-end">
    Total: ₱<span th:text="${cart.total}">0</span>
</h3>

<div class="text-end mt-3">
    <a href="/checkout" class="btn btn-success btn-lg">
        Checkout
    </a>
</div>

</div>

</div>

</body>
</html>
