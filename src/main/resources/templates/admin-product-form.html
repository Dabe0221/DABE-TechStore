<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <h1>Add Product</h1>

    <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea th:field="*{description}" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number" th:field="*{stock}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" th:field="*{category}" class="form-control">
        </div>

        <div class="mb-3">
    <label>Product Image</label>
    <input type="file" name="imageFile" class="form-control">
</div>

        <button class="btn btn-success">Save Product</button>
        <a href="/admin/products" class="btn btn-secondary">Cancel</a>

    </form>

</div>
</body>
</html>
