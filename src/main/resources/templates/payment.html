<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container my-5">

    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-dark text-white">
            Payment Simulation
        </div>

        <div class="card-body">

            <h4>Order #<span th:text="${order.id}"></span></h4>

            <p>
                <strong>Payment Method:</strong>
                <span th:text="${order.paymentMethod}"></span>
            </p>

            <p>
                <strong>Total:</strong>
                ₱<span th:text="${order.totalAmount}"></span>
            </p>

            <div th:if="${order.paymentMethod == 'GCash'}" class="alert alert-info">
                Scan the simulated GCash QR code below.
                <div class="text-center mt-3">
                    <div style="font-size: 90px;">📱</div>
                    <strong>GCash QR Simulation</strong>
                </div>
            </div>

            <div th:if="${order.paymentMethod == 'PayPal'}" class="alert alert-primary">
                PayPal payment simulation.
            </div>

            <div th:if="${order.paymentMethod == 'Credit/Debit Card'}" class="alert alert-secondary">
                Card payment simulation.
            </div>

            <form th:action="@{/payment/{id}/pay(id=${order.id})}" method="post">
                <button class="btn btn-success w-100">
                    Pay Now
                </button>
            </form>

            <a th:href="@{/my-orders/{id}/invoice(id=${order.id})}"
               class="btn btn-outline-dark w-100 mt-3">
                View Invoice
            </a>

        </div>
    </div>

</div>

</body>
</html>
