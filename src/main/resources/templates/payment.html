<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container my-5">

    <div class="card shadow mx-auto" style="max-width: 700px;">

        <div class="card-header bg-dark text-white">
            Secure Payment
        </div>

        <div class="card-body">

            <h4>Order #<span th:text="${order.id}"></span></h4>

            <p>
                <strong>Payment Method:</strong>
                <span th:text="${order.paymentMethod}"></span>
            </p>

            <p>
                <strong>Total:</strong>
                ₱<span th:text="${order.totalAmount}"></span>
            </p>

            <hr>

            <!-- GCASH -->
            <div th:if="${order.paymentMethod == 'GCash'}" class="text-center">

                <h5>GCash Payment</h5>

                <div class="border rounded p-4 my-3 bg-white d-inline-block">
                    <div style="font-size: 90px;">▣</div>
                    <div style="font-size: 70px;">▦</div>
                    <strong>Simulated QR Code</strong>
                </div>

                <p class="text-muted">
                    Open your GCash app and scan this simulated QR code.
                </p>

            </div>

            <!-- PAYPAL -->
            <div th:if="${order.paymentMethod == 'PayPal'}" class="text-center">

                <h5>PayPal Payment</h5>

                <div class="alert alert-primary">
                    You will be redirected to PayPal simulation.
                </div>

                <button type="button" class="btn btn-primary mb-3">
                    Continue with PayPal
                </button>

            </div>

            <!-- CARD -->
            <div th:if="${order.paymentMethod == 'Credit/Debit Card'}">

                <h5>Card Payment</h5>

                <div class="mb-3">
                    <label class="form-label">Card Number</label>
                    <input class="form-control" value="4111 1111 1111 1111" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Card Holder</label>
                    <input class="form-control" value="DABE TECHSTORE TEST" readonly>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Expiry</label>
                        <input class="form-control" value="12/30" readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">CVV</label>
                        <input class="form-control" value="123" readonly>
                    </div>
                </div>

            </div>

            <form th:action="@{/payment/{id}/pay(id=${order.id})}" method="post">

                <button class="btn btn-success w-100 btn-lg">
                    Pay ₱<span th:text="${order.totalAmount}"></span>
                </button>

            </form>

            <a th:href="@{/my-orders/{id}/invoice(id=${order.id})}"
               class="btn btn-outline-dark w-100 mt-3">
                View Invoice
            </a>

        </div>
    </div>

</div>

</body>
</html>
