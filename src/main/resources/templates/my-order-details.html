<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <a href="/my-orders" class="btn btn-secondary mb-4">Back to My Orders</a>

    <h1>Order #<span th:text="${order.id}"></span></h1>

    <div class="card my-4">
        <div class="card-body">
            <p><strong>Status:</strong> <span class="badge bg-warning text-dark" th:text="${order.status}"></span></p>
            <hr>

<h4>Order Timeline</h4>

<div class="mt-3">

    <div class="mb-3">
        <span th:class="${order.status == 'Pending' || order.status == 'Processing' || order.status == 'Shipped' || order.status == 'Delivered'} ? 'badge bg-success' : 'badge bg-secondary'">
            ✓
        </span>
        Order Placed
    </div>

    <div class="mb-3">
        <span th:class="${order.status == 'Processing' || order.status == 'Shipped' || order.status == 'Delivered'} ? 'badge bg-success' : 'badge bg-secondary'">
            ✓
        </span>
        Processing
    </div>

    <div class="mb-3">
        <span th:class="${order.status == 'Shipped' || order.status == 'Delivered'} ? 'badge bg-success' : 'badge bg-secondary'">
            ✓
        </span>
        Shipped
    </div>

    <div class="mb-3">
        <span th:class="${order.status == 'Delivered'} ? 'badge bg-success' : 'badge bg-secondary'">
            ✓
        </span>
        Delivered
    </div>

</div>
            <p><strong>Date:</strong> <span th:text="${order.orderDate}"></span></p>
            <p><strong>Name:</strong> <span th:text="${order.customerName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${order.email}"></span></p>
            <p><strong>Phone:</strong> <span th:text="${order.phone}"></span></p>
            <p><strong>Address:</strong> <span th:text="${order.address}"></span></p>
        </div>
    </div>

    <h3>Items</h3>

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Subtotal</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${order.items}">
            <td th:text="${item.productName}"></td>
            <td>₱<span th:text="${item.price}"></span></td>
            <td th:text="${item.quantity}"></td>
            <td>₱<span th:text="${item.subtotal}"></span></td>
        </tr>
        </tbody>
    </table>

    <h3 class="text-end">
        Total: ₱<span th:text="${order.totalAmount}"></span>
    </h3>

</div>
</body>
</html>
