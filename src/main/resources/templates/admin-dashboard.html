<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">

    <h1 class="mb-4">📊 Admin Dashboard</h1>

    <!-- ================= CARDS ================= -->

    <div class="row g-4">

        <div class="col-md-2">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h6>Total Products</h6>
                    <h2 th:text="${totalProducts}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h6>Total Orders</h6>
                    <h2 th:text="${totalOrders}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h6>Pending</h6>
                    <h2 th:text="${pendingOrders}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h6>Delivered</h6>
                    <h2 th:text="${deliveredOrders}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center bg-success text-white">
                <div class="card-body">
                    <h5>Total Revenue</h5>
                    <h2>
                        ₱<span th:text="${totalRevenue}">0</span>
                    </h2>
                </div>
            </div>
        </div>

        <div class="col-md-2">
    <div class="card shadow text-center">
        <div class="card-body">
            <h6>Customers</h6>
            <h2 th:text="${totalCustomers}">0</h2>
        </div>
    </div>
</div>

    </div>

    <!-- ================= TABLES ================= -->

    <div class="row mt-5">

        <div class="col-lg-6">

            <h3>⚠ Low Stock Products</h3>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Stock</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="product : ${lowStockProducts}">

                    <td th:text="${product.name}"></td>

                    <td>

                        <span class="badge bg-danger"
                              th:text="${product.stock}">
                        </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

        <div class="col-lg-6">

            <h3>🧾 Recent Orders</h3>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="order : ${recentOrders}">

                    <td th:text="${order.id}"></td>

                    <td th:text="${order.customerName}"></td>

                    <td>
                        ₱<span th:text="${order.totalAmount}"></span>
                    </td>

                    <td>

                        <span class="badge bg-warning text-dark"
                              th:text="${order.status}">
                        </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- ================= BUTTONS ================= -->

    <div class="mt-5">

        <a href="/admin/products" class="btn btn-primary">
            Manage Products
        </a>

        <a href="/admin/orders" class="btn btn-success">
            Manage Orders
        </a>

        <a href="/" class="btn btn-secondary">
            Back to Store
        </a>

    </div>

</div>

</body>
</html>
