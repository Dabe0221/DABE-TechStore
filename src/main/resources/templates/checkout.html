<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <h1>Checkout</h1>

    <div class="alert alert-info">
        Total: ₱<span th:text="${cart.total}">0</span>
    </div>

    <form th:action="@{/checkout/place-order}" th:object="${order}" method="post">

        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" th:field="*{customerName}" class="form-control" required>
        </div>

        <div class="mb-3">
    <label>Email</label>
    <input type="email"
           th:value="${#authentication.name}"
           class="form-control"
           readonly>
</div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" th:field="*{phone}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <textarea th:field="*{address}" class="form-control" required></textarea>
        </div>

        <div class="mb-3">
    <label class="form-label">Payment Method</label>

    <select name="paymentMethod" class="form-select" required>
        <option value="">Select payment method</option>
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="GCash">GCash</option>
        <option value="PayPal">PayPal</option>
        <option value="Credit/Debit Card">Credit/Debit Card</option>
    </select>
</div>


        <button class="btn btn-success btn-lg">
            Place Order
        </button>

        <a href="/cart" class="btn btn-secondary btn-lg">
            Back to Cart
        </a>

    </form>

</div>
</body>
</html>
