<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Invoice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .invoice-box{
            max-width:900px;
            margin:40px auto;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 20px rgba(0,0,0,.1);
        }

        .table th{
            background:#212529;
            color:white;
        }

        @media print{
            .no-print{
                display:none;
            }

            body{
                background:white;
            }

            .invoice-box{
                box-shadow:none;
                margin:0;
            }
        }
    </style>

</head>

<body>

<div class="invoice-box">

    <div class="d-flex justify-content-between">

        <div>

            <h2>DABE TechStore</h2>

            <p>
                Electronics Store
            </p>

        </div>

        <div class="text-end">

            <h3>Invoice</h3>

            <p>
                Order #
                <strong th:text="${order.id}"></strong>
            </p>

            <p th:text="${order.orderDate}"></p>

        </div>

    </div>

    <hr>

    <h5>Customer Information</h5>

    <p>

        <strong>Name:</strong>

        <span th:text="${order.customerName}"></span>

        <br>

        <strong>Email:</strong>

        <span th:text="${order.email}"></span>

        <br>

        <strong>Phone:</strong>

        <span th:text="${order.phone}"></span>

        <br>

        <strong>Address:</strong>

        <span th:text="${order.address}"></span>

    </p>

    <h5 class="mt-4">Purchased Items</h5>

    <table class="table table-bordered">

        <thead>

        <tr>

            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Subtotal</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="item : ${order.items}">

            <td th:text="${item.productName}"></td>

            <td>
                ₱<span th:text="${item.price}"></span>
            </td>

            <td th:text="${item.quantity}"></td>

            <td>
                ₱<span th:text="${item.subtotal}"></span>
            </td>

        </tr>

        </tbody>

    </table>

    <div class="text-end mt-4">

        <h3>

            Total:

            ₱<span th:text="${order.totalAmount}"></span>

        </h3>

    </div>

    <div class="mt-5">

        <strong>Status:</strong>

        <span class="badge bg-success"
              th:text="${order.status}">
        </span>

    </div>

    <div class="text-center mt-5">

        <h5>Thank you for shopping with DABE TechStore!</h5>

    </div>

    <div class="text-center mt-4 no-print">

        <button onclick="window.print()"
                class="btn btn-primary">

            🖨 Print Invoice

        </button>

        <a href="/my-orders"
           class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

</body>
</html>
