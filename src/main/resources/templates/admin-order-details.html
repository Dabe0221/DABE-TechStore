<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <a href="/admin/orders" class="btn btn-secondary mb-4">Back to Orders</a>

    <h1>Order #<span th:text="${order.id}">1</span></h1>

    <div class="card my-4">
        <div class="card-header bg-dark text-white">
            Customer Information
        </div>
        <div class="card-body">
            <p><strong>Name:</strong> <span th:text="${order.customerName}">Name</span></p>
            <p><strong>Email:</strong> <span th:text="${order.email}">Email</span></p>
            <p><strong>Phone:</strong> <span th:text="${order.phone}">Phone</span></p>
            <p><strong>Address:</strong> <span th:text="${order.address}">Address</span></p>
          <form th:action="@{/admin/update-order-status}" method="post">

    <input type="hidden" name="id" th:value="${order.id}">

    <div class="mb-3">
        <label class="form-label">Order Status</label>

        <select class="form-select" name="status">
            <option value="Pending" th:selected="${order.status == 'Pending'}">Pending</option>
            <option value="Processing" th:selected="${order.status == 'Processing'}">Processing</option>
            <option value="Shipped" th:selected="${order.status == 'Shipped'}">Shipped</option>
            <option value="Delivered" th:selected="${order.status == 'Delivered'}">Delivered</option>
            <option value="Cancelled" th:selected="${order.status == 'Cancelled'}">Cancelled</option>
        </select>
    </div>

    <button class="btn btn-success">
        Update Status
    </button>

</form>
            <p><strong>Date:</strong> <span th:text="${order.orderDate}">Date</span></p>
        </div>
    </div>

    <h3>Products Ordered</h3>

    <table class="table table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Subtotal</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${order.items}">
            <td th:text="${item.productName}">Product</td>
            <td>₱<span th:text="${item.price}">0</span></td>
            <td th:text="${item.quantity}">1</td>
            <td>₱<span th:text="${item.subtotal}">0</span></td>
        </tr>
        </tbody>
    </table>

    <h3 class="text-end">
        Total: ₱<span th:text="${order.totalAmount}">0</span>
    </h3>

</div>
</body>
</html>
