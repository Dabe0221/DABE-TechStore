<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name}">Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-5">

    <a href="/" class="btn btn-secondary mb-4">Back to Store</a>

    <div class="row">

        <div class="col-md-6">
            <img th:src="@{${product.imageUrl}}"
                 class="img-fluid rounded shadow"
                 style="max-height: 450px; object-fit: cover;">
        </div>

        <div class="col-md-6">

            <h1 th:text="${product.name}">Product Name</h1>

            <p>
                <span class="badge bg-secondary"
                      th:text="${product.category}">
                    Category
                </span>
            </p>

            <h2 class="text-primary">
                ₱<span th:text="${product.price}">0</span>
            </h2>

            <p class="mt-3" th:text="${product.description}">
                Product description
            </p>

            <p>
                <strong>Stock:</strong>

                <span th:if="${product.stock > 5}"
                      class="badge bg-success"
                      th:text="${product.stock + ' Available'}">
                </span>

                <span th:if="${product.stock > 0 && product.stock <= 5}"
                      class="badge bg-warning text-dark"
                      th:text="${product.stock + ' Left'}">
                </span>

                <span th:if="${product.stock <= 0}"
                      class="badge bg-danger">
                    Out of Stock
                </span>
            </p>

          <form th:if="${product.stock > 0}"
      th:action="@{/cart/add/{id}(id=${product.id})}"
      method="post"
      class="mt-3">

    <div class="mb-3" style="max-width: 150px;">
        <label>Quantity</label>
        <div class="input-group" style="max-width: 160px;">
    <button type="button" class="btn btn-outline-secondary" onclick="decreaseQty()">
        -
    </button>

    <input type="text"
           id="quantity"
           name="quantity"
           value="1"
           class="form-control text-center"
           readonly>

    <button type="button"
            class="btn btn-outline-secondary"
            th:attr="data-stock=${product.stock}"
            onclick="increaseQty(this)">
        +
    </button>
</div>
    </div>

    <button class="btn btn-primary btn-lg">
        Add to Cart
    </button>
</form>

  <form th:action="@{/wishlist/add/{id}(id=${product.id})}"
        method="post"
        sec:authorize="isAuthenticated()"
        class="mt-2">

    <button class="btn btn-outline-danger">
        <i class="bi bi-heart"></i>
        Add to Wishlist
    </button>
</form>

            <button th:if="${product.stock <= 0}"
                    class="btn btn-secondary btn-lg mt-3"
                    disabled>
                Sold Out
            </button>

        </div>

    </div>

    <hr class="my-5">

    
<div sec:authorize="isAuthenticated()">

    <h3>Write a Review</h3>

    <form th:action="@{/product/{id}/review(id=${product.id})}" method="post">

        <div class="mb-3">
            <label>Rating</label>
            <select name="rating" class="form-select" required>
                <option value="5">★★★★★ - Excellent</option>
                <option value="4">★★★★☆ - Good</option>
                <option value="3">★★★☆☆ - Average</option>
                <option value="2">★★☆☆☆ - Poor</option>
                <option value="1">★☆☆☆☆ - Bad</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Comment</label>
            <textarea name="comment" class="form-control" required></textarea>
        </div>

        <button class="btn btn-success">
            Submit Review
        </button>

    </form>

</div>

<div sec:authorize="!isAuthenticated()" class="alert alert-info">
    Please <a href="/login">login</a> to write a review.
</div>

<hr class="my-5">

<h3>Customer Reviews</h3>

<p>
    Average Rating:
    <strong th:text="${#numbers.formatDecimal(averageRating, 1, 1)}">0.0</strong>
    / 5
</p>

<div th:if="${#lists.isEmpty(reviews)}" class="alert alert-info">
    No reviews yet. Be the first to review this product.
</div>





<div th:each="review : ${reviews}" class="card mb-3">
    <div class="card-body">

        <h5>
            <span th:text="${review.user.name}">User</span>
        </h5>

        <div class="text-warning">
    <span th:each="i : ${#numbers.sequence(1, 5)}"
          th:text="${i <= review.rating ? '★' : '☆'}">
    </span>
</div>

        <p class="mt-2" th:text="${review.comment}">
            Review comment
        </p>

    </div>
</div>


    <hr class="my-5">

<h3 class="mb-4">You may also like</h3>

<div class="row">

    <div class="col-md-3 mb-4"
         th:each="item : ${relatedProducts}">

        <div class="card h-100 shadow-sm">

            <img th:src="@{${item.imageUrl}}"
                 class="card-img-top"
                 style="height:200px;object-fit:cover;">

            <div class="card-body">

                <h5 th:text="${item.name}"></h5>

                <p class="text-primary fw-bold">
                    ₱<span th:text="${item.price}"></span>
                </p>

                <a th:href="@{/product/{id}(id=${item.id})}"
                   class="btn btn-outline-primary w-100">
                    View Product
                </a>

            </div>

        </div>

    </div>

</div>


</div>

<script>
    function increaseQty(button) {
        const stock = parseInt(button.getAttribute("data-stock"));
        const quantityInput = document.getElementById("quantity");

        let quantity = parseInt(quantityInput.value);

        if (quantity < stock) {
            quantityInput.value = quantity + 1;
        }
    }

    function decreaseQty() {
        const quantityInput = document.getElementById("quantity");

        let quantity = parseInt(quantityInput.value);

        if (quantity > 1) {
            quantityInput.value = quantity - 1;
        }
    }
</script>
</body>
</html>
